<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Sri Lanka Photo Options</title>
<style>
  body { font-family: sans-serif; background: #0a0a0a; color: #fff; padding: 24px; margin: 0; }
  h2 { margin: 0 0 20px; font-size: 18px; color: #f5c842; }
  .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; }
  .card { border-radius: 12px; overflow: hidden; border: 2px solid #222; }
  .card img { width: 100%; height: 180px; object-fit: cover; display: block; }
  .label { padding: 10px 12px; background: #111; font-size: 13px; color: #aaa; }
  .label strong { color: #fff; display: block; }
  p { color: #666; font-size: 13px; }
</style>
</head>
<body>
<h2>Sri Lanka — pick a photo and tell Claude the option number</h2>
<div class="grid">
  <div class="card">
    <img src="https://images.unsplash.com/photo-1562602833-0f4ab2fc46e3?w=600&q=75" />
    <div class="label"><strong>Option 1</strong></div>
  </div>
  <div class="card">
    <img src="https://images.unsplash.com/photo-1605792657660-596af9009e82?w=600&q=75" />
    <div class="label"><strong>Option 2</strong></div>
  </div>
  <div class="card">
    <img src="https://images.unsplash.com/photo-1583416750470-965b2707b355?w=600&q=75" />
    <div class="label"><strong>Option 3</strong></div>
  </div>
  <div class="card">
    <img src="https://images.unsplash.com/photo-1547981609-4b6bfe67ca0b?w=600&q=75" />
    <div class="label"><strong>Option 4</strong></div>
  </div>
  <div class="card">
    <img src="https://images.unsplash.com/photo-1616979506963-83e27e95b20a?w=600&q=75" />
    <div class="label"><strong>Option 5</strong></div>
  </div>
  <div class="card">
    <img src="https://images.unsplash.com/photo-1579965342575-16428a7c8881?w=600&q=75" />
    <div class="label"><strong>Option 6</strong></div>
  </div>
</div>
<p style="margin-top:20px;">Tell Claude "use option X" to apply it.</p>
</body>
</html>
